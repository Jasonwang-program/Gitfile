        <style>
            .timeline-section::before {
                position: absolute;
                content: "";
                top: 0;
                bottom: 0;
                width: 3px;
                background-color: var(--graffiti-rust-orange);
                left: 50%;
                transform: translateX(-50%);
            }

            .timeline-section-pointer {
                position: relative
            }

            .timeline-section-pointer::before {
                position: absolute;
                content: "";
                width: 24px;
                height: 24px;
                background-color: var(--graffiti-concrete-ash);
                border-radius: 50%;
                left: 50%;
                transform: translate(-50%);
                top: 50%;
                border: 6px solid var(--graffiti-deep-alley);
            }

            .timeline-section-pointer:hover::before {
                width: 32px;
                height: 32px;
            }

            @media screen and (max-width:768) {
                .timeline-section::before {
                    display: none;
                }
                .timeline-section-pointer {
                    display: none;
                }
            }
        </style>
    </head>

        <div class="container py-5">
            <div class="timeline-section">

    </body>

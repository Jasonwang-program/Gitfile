<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ch7_Flex</title>
        <link rel="stylesheet" href="../css/bootstrap.min.css" />
        <link rel="stylesheet" href="../css/01_tokens.css" />
        <link rel="stylesheet" href="../css/02_typography.css" />
        <link rel="stylesheet" href="../css/03_components.css" />
        <link rel="stylesheet" href="../css/04_layout.css" />
        <style>
            .box01 {
                height: 120px;
            }
        </style>
    </head>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <body>
        <div class="container">
            <div class="title-01">1. flex-row</div>
            <div class="row d-flex flex-md-row">
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">01</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">02</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">03</div>
                    </div>
                </div>

            <div class="title-01">2. flex-row-reverse</div>
            <div class="row d-flex flex-md-row-reverse">
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">01</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">02</div>

                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">03</div>
                    </div>
                </div>

            <div class="title-01">3. flex-column</div>
            <div class="row d-flex flex-lg-column">
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-center">01</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-center">02</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-center">03</div>
                    </div>
                </div>

            <div class="title-01">4. flex-column-reverse</div>
            <div class="row d-flex flex-md-column-reverse">
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">01</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">

                    </div>
                </div>

            <div class="title-01">5. justify-content-end</div>
            <div class="row justify-content-end">
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">01</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">02</div>
                    </div>
                </div>
                <div class="col-3">
                    <div class="box01 bg-primary">
                        <div class="display-1 text-black text-center">03</div>
                    </div>
                </div>

</html>
